<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AA Copy Tool</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <nav class="tab-bar">
      <button class="tab active" data-tab="search">検索</button>
      <button class="tab" data-tab="stock">ストック</button>
      <button class="tab" data-tab="settings">設定</button>
    </nav>

    <section id="search" class="screen active">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="AAを検索..." />
        <button id="searchBtn">検索</button>
      </div>
      <div id="searchResults" class="aa-list"></div>
    </section>

    <section id="stock" class="screen">
      <div class="filter-bar">
        <select id="sortSelect">
          <option value="use_count">よく使う順</option>
          <option value="created_at">登録日順</option>
        </select>
        <input type="text" id="tagFilter" placeholder="タグで絞り込み" />
      </div>
      <div id="stockList" class="aa-list"></div>
    </section>

    <section id="settings" class="screen">
      <h2>補正プリセット</h2>
      <p class="hint">貼り付け先のサービスごとに補正設定を登録します。コピー時にセレクターで選ぶと自動で補正が適用されます。</p>

      <div id="presetList"></div>

      <div class="section-title">新しいプリセットを追加</div>

      <div class="form-group">
        <label>プリセット名</label>
        <p class="hint">貼り付け先のサービス名（例：Twitter/X、LINE、5ch）</p>
        <input type="text" id="presetName" placeholder="例：Twitter/X" />
      </div>

      <div class="form-group">
        <label>URLパターン</label>
        <p class="hint">貼り付け先のURLに含まれる文字列。複数ある場合は | で区切る（例：twitter.com|x.com）</p>
        <input type="text" id="presetPattern" placeholder="例：twitter.com|x.com" />
      </div>

      <div class="form-group">
        <label>改行コード</label>
        <p class="hint">LF はUnix・Web系サービス向け。CRLF はWindows・掲示板系向け。迷ったらLF。</p>
        <select id="presetNewline">
          <option value="LF">LF（Unix・Web系）</option>
          <option value="CRLF">CRLF（Windows・掲示板系）</option>
        </select>
      </div>

      <div class="form-group">
        <label>スペース補正</label>
        <p class="hint">全角に統一：半角スペースを全角に変換。SNS系で崩れにくくなる。半角に統一：全角スペースを半角に変換。</p>
        <select id="presetSpace">
          <option value="full">全角に統一</option>
          <option value="half">半角に統一</option>
          <option value="none">補正しない</option>
        </select>
      </div>

      <button id="addPresetBtn">追加</button>
    </section>

    <div id="toast" class="toast"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
