<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AA Copy Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; width: 100vw; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    #splash { width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .aa-fly { position: absolute; color: #33ff33; font-family: 'Share Tech Mono', monospace; white-space: pre; opacity: 0; font-size: 13px; line-height: 1.4; }
    #center { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 14px; z-index: 10; }
    #icon-wrap { opacity: 0; transform: scale(0.6); transition: none; }
    #app-title { font-family: 'Share Tech Mono', monospace; font-size: 24px; color: #33ff33; letter-spacing: 6px; opacity: 0; transform: translateY(8px); transition: none; }
    #sub-title { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #33ff3377; letter-spacing: 3px; opacity: 0; transition: none; }
  </style>
</head>
<body>
  <div id="splash">
    <div id="center">
      <div id="icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 192 192">
          <rect width="192" height="192" rx="32" fill="#0a0a0a" stroke="#33ff33" stroke-width="6"/>
          <text x="50%" y="52%" font-family="monospace" font-size="44" fill="#33ff33" text-anchor="middle" dominant-baseline="middle">A(^o^)A</text>
        </svg>
      </div>
      <div id="app-title">AA COPY TOOL</div>
      <div id="sub-title">ASCII ART MANAGER</div>
    </div>
  </div>
  <script>
    const AAS = [
      " \u2227\uff3f\u2227\n\uff08\uff9f\u2200\uff9f \uff09",
      "(\u00b4\uff65\u03c9\uff65)",
      " \u2229\uff3f\uff3f\u2229\n|\u30ce\u3000\u30bd\n/\u3000\u25cf\u25cf|",
      "\uff�\uff80\u2501(\uff9f\u2200\uff9f)\u2501!!",
      "( \uff9fD\uff9f)\u22833\u65e6",
      " \u2227 \u2227\n(*\uff9f\u30fc\uff9f)",
      "\uff08 \uff3e\u03c9\uff3e\uff09",
      "\uff4d\uff19(\uff9f\u0414\uff9f)",
      "(\u00b4\u30fb\u03c9\u30fb\uff40)",
      "( \uff70\u0434\uff70\u00b4)\uff�\uff98\uff83",
      "\u2227\uff3f\u2227\n(\u00b4\u2200\uff40)",
      "(\u30ce\uff40\u0414\u00b4)\u30ce\u5f61\u253b\u2501\u253b",
    ];

    const splash = document.getElementById('splash');
    const iconWrap = document.getElementById('icon-wrap');
    const appTitle = document.getElementById('app-title');
    const subTitle = document.getElementById('sub-title');
    const durBase = 3000;
    const interval = 400;

    AAS.forEach((aa, i) => {
      const el = document.createElement('div');
      el.className = 'aa-fly';
      el.textContent = aa;
      splash.appendChild(el);

      const fromLeft = Math.random() > 0.5;
      const startX = fromLeft ? -160 : window.innerWidth + 60;
      const endX = fromLeft ? window.innerWidth + 60 : -160;
      const y = 20 + Math.random() * (window.innerHeight - 80);
      const delay = i * interval;
      const dur = durBase + Math.random() * 400;

      el.style.top = y + 'px';
      el.style.left = startX + 'px';

      setTimeout(() => {
        el.style.transition = 'left ' + dur + 'ms linear, opacity 200ms';
        el.style.opacity = 0.9;
        el.style.left = endX + 'px';
        setTimeout(() => { el.style.opacity = 0; }, dur - 300);
      }, delay);
    });

    const iconDelay = AAS.length * interval + 200;

    setTimeout(() => {
      iconWrap.style.transition = 'opacity 600ms ease, transform 600ms ease';
      iconWrap.style.opacity = 1;
      iconWrap.style.transform = 'scale(1)';
    }, iconDelay);

    setTimeout(() => {
      appTitle.style.transition = 'opacity 500ms ease, transform 500ms ease';
      appTitle.style.opacity = 1;
      appTitle.style.transform = 'translateY(0)';
    }, iconDelay + 500);

    setTimeout(() => {
      subTitle.style.transition = 'opacity 500ms ease';
      subTitle.style.opacity = 1;
    }, iconDelay + 900);

    setTimeout(() => {
      window.location.href = 'index.html';
    }, iconDelay + 2200);
  <\/script>
</body>
</html>
